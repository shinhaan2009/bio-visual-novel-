<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>생물 미연시: Bio Vibe Lab</title>
  <meta name="description" content="생물학 기반 비주얼 노벨. 미생물 캐릭터들과의 스토리를 따라가며 생물 지식을 배운다.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #100e1a;
      --bg2: #1a1726;
      --surface: rgba(28, 24, 42, 0.92);
      --surface2: rgba(38, 32, 56, 0.85);
      --text: #ece4f4;
      --text-dim: #8e84a0;
      --border: rgba(255, 255, 255, 0.07);
      --border-light: rgba(255, 255, 255, 0.12);
      --accent: #8b6cef;
      --glow: rgba(139, 108, 239, 0.25);
      --radius: 14px;
      --radius-sm: 8px;
      --font: "Noto Sans KR", "Segoe UI", system-ui, -apple-system, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font);
      color: var(--text);
      background: linear-gradient(145deg, #0e0b18, #18142a 40%, #100e1a 70%);
    }
    button { font: inherit; border: 0; cursor: pointer; color: inherit; background: none; }
    button:disabled { cursor: not-allowed; opacity: 0.4; }
    img { display: block; max-width: 100%; }

    /* ── App Container ── */
    #app { width: 100%; height: 100vh; position: relative; overflow: hidden; }

    /* ── Modes ── */
    .mode { position: absolute; inset: 0; transition: opacity 0.5s ease, visibility 0.5s ease; }
    .mode.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    /* ══════════════════════════════════════════════
       LOBBY MODE
       ══════════════════════════════════════════════ */
    #lobby {
      display: flex; flex-direction: column;
      background:
        radial-gradient(ellipse at 20% 10%, rgba(139,108,239,0.12), transparent 50%),
        radial-gradient(ellipse at 80% 90%, rgba(78,190,160,0.08), transparent 50%),
        var(--bg);
      overflow-y: auto;
    }
    .lobby-header {
      text-align: center; padding: 48px 24px 32px;
    }
    .lobby-header h1 {
      font-size: clamp(28px, 5vw, 48px); font-weight: 900;
      background: linear-gradient(135deg, #c9b8ff, #8b6cef, #5ee4c0);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1.2;
    }
    .lobby-header p {
      margin-top: 12px; color: var(--text-dim); font-size: 15px; line-height: 1.6;
    }
    .lobby-actions {
      margin-top: 20px; display: flex; gap: 10px; justify-content: center;
    }
    .lobby-actions button {
      padding: 10px 22px; border-radius: var(--radius-sm);
      background: var(--surface2); border: 1px solid var(--border-light);
      font-weight: 700; font-size: 14px; transition: background 0.2s;
    }
    .lobby-actions button.primary {
      background: var(--accent); border-color: var(--accent); color: #fff;
    }
    .lobby-actions button:not(.primary):hover { background: rgba(139,108,239,0.2); }
    .lobby-actions button.primary:hover { background: #7a5cd9; }

    .char-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px; padding: 0 24px 48px; max-width: 1100px;
      margin: 0 auto; width: 100%;
    }
    .char-card {
      display: grid; grid-template-columns: 68px 1fr; gap: 16px;
      align-items: center; padding: 18px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      text-align: left; width: 100%;
    }
    .char-card:hover {
      transform: translateY(-3px);
      border-color: var(--card-color);
      box-shadow: 0 12px 40px rgba(0,0,0,0.3), 0 0 20px color-mix(in srgb, var(--card-color) 20%, transparent);
    }
    .char-card .avatar-circle {
      width: 68px; height: 68px; border-radius: 50%;
      display: grid; place-items: center;
      background: linear-gradient(135deg,
        color-mix(in srgb, var(--card-color), #000 30%),
        color-mix(in srgb, var(--card-color), #000 60%));
      border: 2px solid color-mix(in srgb, var(--card-color), transparent 50%);
      overflow: hidden;
    }
    .char-card .avatar-circle svg, .char-card .avatar-circle img {
      width: 52px; height: 52px;
    }
    .char-card .avatar-circle img {
      width: 100%; height: 100%; object-fit: cover;
      object-position: var(--thumb-pos, center);
    }
    .char-card .info h3 { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .char-card .info .tagline {
      font-size: 12px; color: var(--text-dim); line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .chapter-dots {
      display: flex; gap: 6px; margin-top: 10px; grid-column: 1 / -1;
    }
    .chapter-dots .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.2);
      transition: background 0.3s;
    }
    .chapter-dots .dot.done { background: var(--card-color); border-color: var(--card-color); }
    .chapter-dots .dot.current {
      background: transparent;
      border-color: var(--card-color);
      box-shadow: 0 0 6px var(--card-color);
    }
    .chapter-dots .dot.locked { opacity: 0.3; }

    /* ── Chapter Select Overlay ── */
    .overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      background: rgba(8, 6, 14, 0.7); backdrop-filter: blur(12px);
      transition: opacity 0.3s, visibility 0.3s;
    }
    .overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .overlay-box {
      width: min(520px, 100%); max-height: calc(100vh - 40px); overflow-y: auto;
      padding: 28px; border-radius: var(--radius);
      background: var(--surface); border: 1px solid var(--border-light);
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    }
    .overlay-box h2 {
      font-size: 22px; font-weight: 900; margin-bottom: 6px;
    }
    .overlay-box .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 20px; }
    .chapter-list { display: grid; gap: 10px; }
    .chapter-item {
      display: grid; grid-template-columns: 36px 1fr; gap: 12px; align-items: center;
      padding: 14px; border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      text-align: left; transition: background 0.2s, border-color 0.2s;
    }
    .chapter-item:not(:disabled):hover {
      background: rgba(139,108,239,0.1); border-color: var(--accent);
    }
    .chapter-item .ch-num {
      width: 36px; height: 36px; border-radius: 50%;
      display: grid; place-items: center;
      font-weight: 900; font-size: 15px;
      background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.15);
    }
    .chapter-item .ch-num.done { background: var(--accent); border-color: var(--accent); }
    .chapter-item .ch-info strong { display: block; font-size: 15px; margin-bottom: 2px; }
    .chapter-item .ch-info span { color: var(--text-dim); font-size: 12px; }
    .overlay-close {
      width: 100%; margin-top: 16px; padding: 12px;
      border-radius: var(--radius-sm); background: rgba(255,255,255,0.05);
      font-weight: 700; transition: background 0.2s;
    }
    .overlay-close:hover { background: rgba(255,255,255,0.1); }

    /* ══════════════════════════════════════════════
       STORY MODE
       ══════════════════════════════════════════════ */
    #story {
      display: grid; grid-template-rows: 1fr auto;
    }
    .story-stage {
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .story-bg {
      position: absolute; inset: 0; transition: background 0.8s ease;
      background: radial-gradient(ellipse at 50% 40%,
        color-mix(in srgb, var(--char-color, #8b6cef), #0e0b18 75%),
        #0e0b18 70%);
    }
    .story-bg::after {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
    }
    .story-character {
      position: relative; z-index: 2;
      width: min(380px, 60vw); max-height: 55vh;
      display: flex; align-items: flex-end; justify-content: center;
      animation: breathe 3.8s ease-in-out infinite;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4));
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .story-character.entering { opacity: 0; transform: translateY(20px); }
    .story-character svg, .story-character img {
      width: 100%; max-height: 55vh;
    }
    .story-character figure {
      width: 100%; height: min(420px, 55vh);
      border-radius: var(--radius); overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .story-character figure img {
      width: 100%; height: 100%; object-fit: cover;
      object-position: var(--img-pos, center);
    }

    /* ── Affection Bar ── */
    .affection-container {
      position: absolute; top: 16px; left: 16px; z-index: 10;
      display: flex; flex-direction: column; gap: 4px;
      padding: 10px 14px; border-radius: var(--radius-sm);
      background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      width: 120px;
    }
    .affection-label {
      font-size: 12px; font-weight: 700; color: var(--text);
      display: flex; justify-content: space-between;
    }
    .affection-label span {
      color: var(--char-color, var(--accent));
      font-weight: 900;
    }
    .affection-bar {
      width: 100%; height: 6px; border-radius: 3px;
      background: rgba(255,255,255,0.1); overflow: hidden;
    }
    .affection-fill {
      height: 100%; background: var(--char-color, var(--accent));
      width: 0%; transition: width 0.4s ease-out;
      box-shadow: 0 0 8px color-mix(in srgb, var(--char-color, var(--accent)) 60%, transparent);
    }

    .chapter-tag {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 10; padding: 6px 18px; border-radius: 20px;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 12px; color: var(--text-dim); font-weight: 700;
      white-space: nowrap;
    }
    .story-menu-btn {
      position: absolute; top: 16px; right: 16px; z-index: 10;
      width: 42px; height: 42px; border-radius: 50%;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 18px; display: grid; place-items: center;
      transition: background 0.2s;
    }
    .story-menu-btn:hover { background: rgba(139,108,239,0.3); }

    /* Dialogue Panel */
    .dialogue-area {
      position: relative; z-index: 5;
      padding: 0 20px 20px;
    }
    .dialogue-panel {
      max-width: 800px; margin: 0 auto;
      padding: 20px 24px 18px;
      background: rgba(10, 8, 20, 0.88);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      box-shadow: 0 -10px 40px rgba(0,0,0,0.3);
      min-height: 140px;
      cursor: pointer; user-select: none;
      transition: opacity 0.3s;
    }
    .speaker-tag {
      display: inline-block; padding: 3px 14px; border-radius: 6px;
      font-size: 13px; font-weight: 900; margin-bottom: 10px;
      background: var(--char-color, var(--accent));
      color: #fff; letter-spacing: 0.02em;
    }
    .speaker-tag.narrator {
      background: rgba(255,255,255,0.1); color: var(--text-dim);
    }
    .dialogue-text {
      font-size: clamp(15px, 2.2vw, 18px); line-height: 1.85;
      color: var(--text); word-break: keep-all;
      min-height: 50px;
    }
    .dialogue-text .cursor {
      display: inline-block; width: 2px; height: 1em;
      background: var(--text); margin-left: 2px;
      animation: blink-cursor 0.6s infinite;
      vertical-align: text-bottom;
    }
    .click-hint {
      text-align: right; margin-top: 8px;
      font-size: 12px; color: var(--text-dim);
      animation: pulse-hint 1.5s ease-in-out infinite;
    }
    .click-hint.hidden { display: none; }

    /* Choice Panel */
    .choice-area {
      max-width: 800px; margin: 0 auto 10px;
      padding: 0 20px;
      display: grid; gap: 8px;
      transition: opacity 0.4s; opacity: 0;
    }
    .choice-area.visible { opacity: 1; }
    .choice-btn {
      width: 100%; padding: 14px 18px; text-align: left;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 15px; font-weight: 500; line-height: 1.5;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      transform: translateX(20px); opacity: 0;
      animation: slide-in 0.3s ease forwards;
    }
    .choice-btn:nth-child(2) { animation-delay: 0.08s; }
    .choice-btn:nth-child(3) { animation-delay: 0.16s; }
    .choice-btn:hover {
      background: rgba(139,108,239,0.15);
      border-color: var(--accent);
      transform: translateX(4px);
    }

    /* ── Ending Screen ── */
    .ending-screen {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      background: rgba(6,4,12,0.92); backdrop-filter: blur(16px);
      transition: opacity 0.6s, visibility 0.6s; opacity: 0;
      visibility: hidden; pointer-events: none;
    }
    .ending-screen.visible { opacity: 1; visibility: visible; pointer-events: auto; }
    .ending-box {
      text-align: center; max-width: 560px;
    }
    .ending-box .ending-label {
      display: inline-block; padding: 6px 20px; border-radius: 20px;
      font-size: 13px; font-weight: 900; letter-spacing: 0.08em;
      background: var(--char-color, var(--accent));
      margin-bottom: 16px;
    }
    .ending-box h2 {
      font-size: clamp(24px, 5vw, 40px); font-weight: 900;
      margin-bottom: 20px; line-height: 1.3;
    }
    .ending-box p {
      color: var(--text-dim); font-size: 16px; line-height: 1.8;
      margin-bottom: 32px; word-break: keep-all;
    }
    .ending-box button {
      padding: 14px 32px; border-radius: var(--radius-sm);
      background: var(--accent); color: #fff;
      font-weight: 700; font-size: 15px; transition: background 0.2s;
    }
    .ending-box button:hover { background: #7a5cd9; }

    /* ── Save/Load Overlay ── */
    .save-slots { display: grid; gap: 10px; margin: 16px 0; }
    .save-slot {
      display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center;
      padding: 14px; border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      text-align: left; transition: background 0.2s;
    }
    .save-slot:hover { background: rgba(255,255,255,0.06); }
    .save-slot .slot-info strong { display: block; font-size: 14px; margin-bottom: 2px; }
    .save-slot .slot-info span { color: var(--text-dim); font-size: 12px; }
    .save-slot .slot-badge {
      padding: 4px 10px; border-radius: 4px;
      font-size: 11px; font-weight: 700;
      background: rgba(139,108,239,0.2);
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(16px);
      z-index: 300; padding: 12px 20px; border-radius: var(--radius-sm);
      background: rgba(20,16,32,0.95); border: 1px solid var(--border-light);
      backdrop-filter: blur(12px); font-size: 14px; font-weight: 500;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }

    /* ── Animations ── */
    .heart-particle {
      position: absolute; pointer-events: none; z-index: 50;
      color: var(--char-color, #ef6c8b);
      font-size: clamp(40px, 8vw, 70px);
      animation: float-up-heart 1.5s ease-out forwards;
      filter: drop-shadow(0 0 15px color-mix(in srgb, currentColor 80%, transparent));
    }
    @keyframes float-up-heart {
      0% { opacity: 0; transform: translate(0, 0) scale(0.3) rotate(0deg); }
      15% { opacity: 1; transform: translate(calc(var(--tx) * 0.1), calc(var(--ty) * 0.1)) scale(1.4) rotate(calc(var(--tx) * 0.5deg)); }
      30% { opacity: 1; transform: translate(calc(var(--tx) * 0.3), calc(var(--ty) * 0.3)) scale(1.1) rotate(calc(var(--tx) * 0.8deg)); }
      80% { opacity: 1; transform: translate(calc(var(--tx) * 0.8), calc(var(--ty) * 0.8)) scale(1.2) rotate(calc(var(--tx) * 1.2deg)); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.9) rotate(calc(var(--tx) * 1.5deg)); }
    }

    @keyframes breathe {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }
    @keyframes blink-cursor {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes pulse-hint {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    @keyframes slide-in {
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }
    .shake { animation: shake 0.4s ease-in-out; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .char-grid { grid-template-columns: 1fr; padding: 0 16px 32px; }
      .lobby-header { padding: 32px 16px 24px; }
      .dialogue-area { padding: 0 12px 12px; }
      .dialogue-panel { padding: 16px 18px 14px; min-height: 120px; }
      .story-character { width: min(280px, 70vw); }
      .choice-area { padding: 0 12px; }
      .affection-container { width: 100px; padding: 8px 10px; top: 12px; left: 12px; }
      .chapter-tag { top: 68px; }
    }
    @media (min-height: 800px) {
      .story-character { max-height: 50vh; }
    }
  </style>
</head>
<body>
<div id="app">
  <!-- ══ LOBBY ══ -->
  <div id="lobby" class="mode">
    <header class="lobby-header">
      <h1>생물 미연시: Bio Vibe Lab</h1>
      <p>미생물 캐릭터들의 스토리를 따라가며 생물학을 배운다.<br>선택이 관계를 바꾸고, 지식이 엔딩을 결정한다.</p>
      <div class="lobby-actions">
        <button id="lobbyStartBtn" class="primary">시작하기</button>
        <button id="lobbyLoadBtn">저장 불러오기</button>
      </div>
    </header>
    <div class="char-grid" id="charGrid"></div>
  </div>

  <!-- ══ STORY ══ -->
  <div id="story" class="mode hidden">
    <div class="story-stage">
      <div class="story-bg" id="storyBg"></div>
      <div class="chapter-tag" id="chapterTag"></div>
      
      <div class="affection-container" id="affectionContainer">
        <div class="affection-label">호감도 <span id="affectionValue">0</span></div>
        <div class="affection-bar">
          <div class="affection-fill" id="affectionFill"></div>
        </div>
      </div>

      <button class="story-menu-btn" id="storyMenuBtn" title="메뉴">☰</button>
      <div class="story-character" id="storyChar"></div>
    </div>
    <div class="dialogue-area" id="dialogueArea">
      <div class="choice-area" id="choiceArea"></div>
      <div class="dialogue-panel" id="dialoguePanel">
        <div class="speaker-tag" id="speakerTag"></div>
        <div class="dialogue-text" id="dialogueText"></div>
        <div class="click-hint hidden" id="clickHint">클릭하여 계속 ▼</div>
      </div>
    </div>
  </div>

  <!-- ══ CHAPTER SELECT ══ -->
  <div id="chapterOverlay" class="overlay hidden">
    <div class="overlay-box">
      <h2 id="chapterOverlayTitle"></h2>
      <div class="subtitle" id="chapterOverlaySubtitle"></div>
      <div class="chapter-list" id="chapterListEl"></div>
      <button class="overlay-close" id="chapterCloseBtn">돌아가기</button>
    </div>
  </div>

  <!-- ══ MENU ══ -->
  <div id="menuOverlay" class="overlay hidden">
    <div class="overlay-box">
      <h2>메뉴</h2>
      <div class="subtitle" id="menuSubtitle"></div>
      <div style="display:grid;gap:8px;margin-top:16px;">
        <button class="chapter-item" id="menuSaveBtn"><div class="ch-num">💾</div><div class="ch-info"><strong>저장하기</strong><span>현재 진행 상황을 저장합니다</span></div></button>

  return new URL(encoded, document.baseURI).href;
}

const bgImageCache = new Map();

function setStoryBackground(key) {
  const preset = BACKGROUNDS[key] || BACKGROUNDS.interface;
  const gradient = `radial-gradient(ellipse at 50% 40%, color-mix(in srgb, var(--char-color, #8b6cef) 40%, rgba(14, 11, 24, 0.65)), rgba(14, 11, 24, 0.85))`;

  const apply = (imageLayer) => {
    storyBgEl.style.backgroundImage = imageLayer
      ? `${gradient}, ${imageLayer}`
      : `${preset.fallback}, ${gradient}`;
    storyBgEl.style.backgroundSize = imageLayer ? "cover, cover" : "cover, cover";
    storyBgEl.style.backgroundPosition = "center, center";
  };

  if (bgImageCache.has(key)) {
    apply(bgImageCache.get(key));
    return;
  }

  if (!preset.file) {
    bgImageCache.set(key, null);
    apply(null);
    return;
  }

  const img = new Image();
  img.onload = () => {
    const layer = `url("${assetUrl(preset.file)}")`;
    bgImageCache.set(key, layer);
    apply(layer);
  };
  img.onerror = () => {
    bgImageCache.set(key, null);
    apply(null);
  };
  img.src = assetUrl(preset.file);
}

function resolveBackgroundKey(text) {
  const t = text.toLowerCase();
  if (t.includes("복도")) return "hallway";
  if (t.includes("학교") || t.includes("실습실") || t.includes("실험실") || t.includes("교실") || t.includes("온실") || t.includes("발생학")) return "school";
  if (t.includes("빵집") || t.includes("조리") || t.includes("베이커리")) return "bakery";
  if (t.includes("바다") || t.includes("해변") || t.includes("수조")) return "ocean";
  if (t.includes("찜질방") || t.includes("온천") || t.includes("사우나") || t.includes("목욕")) return "sauna";
  if (t.includes("카페") || t.includes("커피") || t.includes("다방")) return "cafe";
  return "interface";
}

/* ══════════════════════════════════════════════
   GAME STATE
   ══════════════════════════════════════════════ */
const state = {
  mode: "lobby",       // "lobby" | "story"
  charId: null,        // current character id
  chapter: 0,          // current chapter index
  scene: 0,            // current scene index
  affection: {},       // { charId: number }
  flags: {},           // { flagName: true }
  completed: {},       // { charId: [chapterIndices] }
  typing: false,       // is text currently being typed
  typingTimer: null,   // typing interval id
  fullText: "",        // full text of current scene
  shownText: "",       // currently shown text
  charIndex: 0,        // typing character index
  waitingForClick: false,
  endingShown: null    // which ending type was shown
};

// Initialize per-character state
characters.forEach(c => {
  state.affection[c.id] = 0;
  state.completed[c.id] = [];
});

/* ══════════════════════════════════════════════
   DOM REFERENCES
   ══════════════════════════════════════════════ */
const $ = id => document.getElementById(id);
const lobbyEl = $("lobby");
const storyEl = $("story");
const charGridEl = $("charGrid");
const storyBgEl = $("storyBg");
const storyCharEl = $("storyChar");
const chapterTagEl = $("chapterTag");
const affectionValueEl = $("affectionValue");
const affectionFillEl = $("affectionFill");
const speakerTagEl = $("speakerTag");
const dialogueTextEl = $("dialogueText");
const clickHintEl = $("clickHint");
const choiceAreaEl = $("choiceArea");
const dialoguePanelEl = $("dialoguePanel");
const chapterOverlayEl = $("chapterOverlay");
const menuOverlayEl = $("menuOverlay");
const saveLoadOverlayEl = $("saveLoadOverlay");
const endingScreenEl = $("endingScreen");
const toastEl = $("toast");

/* ══════════════════════════════════════════════
   TOAST
   ══════════════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2200);
}

/* ══════════════════════════════════════════════
   LOBBY RENDERING
   ══════════════════════════════════════════════ */
function renderLobby() {
  charGridEl.innerHTML = "";
  characters.forEach(c => {
    const charStory = stories[c.id] || [];
    const completedChs = state.completed[c.id] || [];
    const totalChs = charStory.length;

    const card = document.createElement("button");
    card.className = "char-card";
    card.style.setProperty("--card-color", c.color);
    card.addEventListener("click", () => openChapterSelect(c.id));

    // Avatar
    const avatarDiv = document.createElement("div");
    avatarDiv.className = "avatar-circle";
    avatarDiv.innerHTML = miniAvatarMarkup(c);

    // Info
    const infoDiv = document.createElement("div");
    infoDiv.className = "info";
    infoDiv.innerHTML = `<h3>${c.name}</h3><div class="tagline">${c.tagline}</div>`;

    // Chapter dots
    const dotsDiv = document.createElement("div");
    dotsDiv.className = "chapter-dots";
    for (let i = 0; i < totalChs; i++) {
      const dot = document.createElement("div");
      dot.className = "dot";
      if (completedChs.includes(i)) dot.classList.add("done");
      else if (i === 0 || completedChs.includes(i - 1)) dot.classList.add("current");
      else dot.classList.add("locked");
      dotsDiv.appendChild(dot);
    }

    card.appendChild(avatarDiv);
    card.appendChild(infoDiv);
    card.appendChild(dotsDiv);
    charGridEl.appendChild(card);
  });
}

/* ══════════════════════════════════════════════
   CHAPTER SELECT
   ══════════════════════════════════════════════ */
function openChapterSelect(charId) {
  const c = characters.find(ch => ch.id === charId);
  const charStory = stories[charId] || [];
  const completedChs = state.completed[charId] || [];

  if (charStory.length === 0) {
    showToast(`${c.name} 스토리는 아직 준비 중입니다.`);
    return;
  }

  $("chapterOverlayTitle").textContent = c.name;
  $("chapterOverlaySubtitle").textContent = `${c.tagline} · 호감도 ${state.affection[charId]}`;

  const listEl = $("chapterListEl");
  listEl.innerHTML = "";

  charStory.forEach((ch, i) => {
    const unlocked = i === 0 || completedChs.includes(i - 1);
    const done = completedChs.includes(i);

    const btn = document.createElement("button");
    btn.className = "chapter-item";
    btn.disabled = !unlocked;
    btn.innerHTML = `
      <div class="ch-num ${done ? "done" : ""}">${i + 1}</div>
      <div class="ch-info">
        <strong>${done ? "✓ " : ""}${ch.title}</strong>
        <span>${unlocked ? ch.subtitle : "🔒 이전 챕터를 완료하세요"}</span>
      </div>
    `;
    if (unlocked) {
      btn.addEventListener("click", () => {
        chapterOverlayEl.classList.add("hidden");
        startChapter(charId, i);
      });
    }
    listEl.appendChild(btn);
  });

  chapterOverlayEl.classList.remove("hidden");
}

$("chapterCloseBtn").addEventListener("click", () => chapterOverlayEl.classList.add("hidden"));

/* ══════════════════════════════════════════════
   STORY ENGINE
   ══════════════════════════════════════════════ */
function updateAffectionBar() {
  const aff = state.affection[state.charId] || 0;
  affectionValueEl.textContent = aff;
  const percentage = Math.min(Math.max(aff, 0), 100);
  affectionFillEl.style.width = `${percentage}%`;
}

function spawnHeartEffect(amount) {
  const stage = document.querySelector(".story-stage");
  if (!stage) return;
  const numHearts = Math.max(5, Math.min(Math.floor(amount), 12));
  
  for (let i = 0; i < numHearts; i++) {
    const heart = document.createElement("div");
    heart.className = "heart-particle";
    heart.innerHTML = "♥";
    
    const startX = 30 + Math.random() * 40; // 30% to 70% width
    const startY = 20 + Math.random() * 40; // 20% to 60% height
    
    heart.style.left = `${startX}%`;
    heart.style.top = `${startY}%`;
    
    const tx = (Math.random() - 0.5) * 150; // -75px to 75px
    const ty = -100 - Math.random() * 150; // -100px to -250px
    heart.style.setProperty('--tx', `${tx}px`);
    heart.style.setProperty('--ty', `${ty}px`);
    heart.style.animationDelay = `${Math.random() * 0.4}s`;
    
    stage.appendChild(heart);
    setTimeout(() => heart.remove(), 2000);
  }
}

function startChapter(charId, chapterIndex) {
  state.charId = charId;
  state.chapter = chapterIndex;
  state.scene = 0;
  state.endingShown = null;
  state.mode = "story";

  const c = characters.find(ch => ch.id === charId);
  const ch = stories[charId][chapterIndex];

  // Update visuals
  document.documentElement.style.setProperty("--char-color", c.color);
  storyBgEl.style.setProperty("--char-color", c.color);
  chapterTagEl.textContent = `제${chapterIndex + 1}장 · ${ch.title}`;

  // Show character
  renderStoryCharacter(c, "neutral");
  updateAffectionBar();

  // Switch mode
  lobbyEl.classList.add("hidden");
  storyEl.classList.remove("hidden");

  // Start first scene
  showScene();
}

function getCharacter(id) {
  return characters.find(c => c.id === (id || state.charId));
}

function getCurrentStory() {
  return stories[state.charId] && stories[state.charId][state.chapter];
}

function getCurrentScene() {
  const story = getCurrentStory();
  return story?.scenes[state.scene];
}

function checkCondition(condition) {
  if (!condition) return true;

  if (condition.flag && !state.flags[condition.flag]) return false;
  if (condition.noFlags) {
    if (condition.noFlags.some(f => state.flags[f])) return false;
  }
  if (condition.minAffection !== undefined) {
    if ((state.affection[state.charId] || 0) < condition.minAffection) return false;
  }
  return true;
}

function showScene() {
  const scene = getCurrentScene();
  if (!scene) {
    // End of chapter
    completeChapter();
    return;
  }

  // --- Background Logic Injection ---
  if (state.scene === 0) {
    state.currentBg = null; // Reset on chapter start
  }
  
  const bgText = (scene.text || "") + " " + (getCurrentStory()?.title || "") + " " + (scene.title || "");
  if (bgText.trim()) {
    const newBg = resolveBackgroundKey(bgText);
    if (state.currentBg !== newBg) {
      state.currentBg = newBg;
      setStoryBackground(newBg);
    }
  }
  // ----------------------------------

  // Check condition
  if (!checkCondition(scene.condition)) {
    state.scene++;
    showScene();
    return;
  }

  // Handle different scene types
  if (scene.type === "choice") {
    showChoices(scene.choices);
    return;
  }

  if (scene.type === "ending") {
    showEnding(scene);
    return;
  }

  // Regular dialogue scene
  choiceAreaEl.classList.remove("visible");
  choiceAreaEl.innerHTML = "";
  clickHintEl.classList.add("hidden");

  // Speaker
  const c = getCharacter();
  if (scene.speaker) {
    const speakerChar = getCharacter(scene.speaker);
    speakerTagEl.textContent = speakerChar ? speakerChar.name : scene.speaker;
    speakerTagEl.className = "speaker-tag";
    speakerTagEl.style.background = speakerChar ? speakerChar.color : "";
    // Update character mood
    if (speakerChar && scene.mood) {
      renderStoryCharacter(speakerChar, scene.mood);
    }
  } else {
    speakerTagEl.textContent = "나레이션";
    speakerTagEl.className = "speaker-tag narrator";
    speakerTagEl.style.background = "";
  }

  // Apply effects
  if (scene.effect === "shake") {
    storyCharEl.classList.add("shake");
    setTimeout(() => storyCharEl.classList.remove("shake"), 500);
  }

  // Start typing
  startTyping(scene.text);
}

function showChoices(choices) {
  // Hide click hint, show choices
  clickHintEl.classList.add("hidden");
  dialoguePanelEl.style.opacity = "0.3";

  choiceAreaEl.innerHTML = "";
  choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.textContent = choice.text;
    btn.style.animationDelay = `${i * 0.08}s`;
    btn.addEventListener("click", () => selectChoice(choice));
    choiceAreaEl.appendChild(btn);
  });

  setTimeout(() => choiceAreaEl.classList.add("visible"), 50);
}

function selectChoice(choice) {
  // Apply effects
  if (choice.effect) {
    if (choice.effect.affection) {
      state.affection[state.charId] = (state.affection[state.charId] || 0) + choice.effect.affection;
    }
    if (choice.effect.flags) {
      Object.assign(state.flags, choice.effect.flags);
    }
  }

  // Hide choices and restore dialogue panel
  choiceAreaEl.classList.remove("visible");
  choiceAreaEl.innerHTML = "";
  dialoguePanelEl.style.opacity = "1";

  // Show toast for affection change
  if (choice.effect && choice.effect.affection) {
    const sign = choice.effect.affection > 0 ? "+" : "";
    showToast(`호감도 ${sign}${choice.effect.affection}`);
    updateAffectionBar();
    if (choice.effect.affection > 0) {
      spawnHeartEffect(choice.effect.affection);
    }
  }

  // Advance
  state.scene++;
  showScene();
}

function showEnding(scene) {
  // Mark which ending type so we can skip others
  state.flags[`_${scene.endingType}_shown`] = true;
  state.endingShown = scene.endingType;

  const c = getCharacter();

  // Show ending screen
  $("endingLabel").textContent = {
    true: "TRUE ENDING", normal: "NORMAL ENDING", bad: "BAD ENDING"
  }[scene.endingType] || "ENDING";
  $("endingLabel").style.background = c.color;
  $("endingTitle").textContent = scene.title;
  $("endingText").textContent = scene.text;
  endingScreenEl.style.setProperty("--char-color", c.color);
  endingScreenEl.classList.add("visible");

  // Mark chapter as completed
  if (!state.completed[state.charId].includes(state.chapter)) {
    state.completed[state.charId].push(state.chapter);
  }
  autoSave();
}

function completeChapter() {
  if (!state.completed[state.charId].includes(state.chapter)) {
    state.completed[state.charId].push(state.chapter);
  }

  const c = getCharacter();
  const ch = getCurrentStory();
  showToast(`제${state.chapter + 1}장 「${ch.title}」 완료!`);
  autoSave();

  // Return to lobby after a short delay
  setTimeout(() => returnToLobby(), 800);
}

function returnToLobby() {
  state.mode = "lobby";
  storyEl.classList.add("hidden");
  lobbyEl.classList.remove("hidden");
  endingScreenEl.classList.remove("visible");
  renderLobby();
}

/* ══════════════════════════════════════════════
   TYPING ENGINE
   ══════════════════════════════════════════════ */
const TYPING_SPEED = 32; // ms per character

function startTyping(text) {
  stopTyping();
  state.fullText = text;
  state.shownText = "";
  state.charIndex = 0;
  state.typing = true;
  state.waitingForClick = false;

  dialogueTextEl.innerHTML = '<span class="cursor"></span>';

  state.typingTimer = setInterval(() => {
    if (state.charIndex < state.fullText.length) {
      state.shownText += state.fullText[state.charIndex];
      state.charIndex++;
      dialogueTextEl.innerHTML = state.shownText + '<span class="cursor"></span>';
    } else {
      finishTyping();
    }
  }, TYPING_SPEED);
}

function finishTyping() {
  stopTyping();
  state.typing = false;
  state.waitingForClick = true;
  dialogueTextEl.textContent = state.fullText;
  clickHintEl.classList.remove("hidden");
}

function stopTyping() {
  if (state.typingTimer) {
    clearInterval(state.typingTimer);
    state.typingTimer = null;
  }
}

function completeTyping() {
  stopTyping();
  state.typing = false;
  state.shownText = state.fullText;
  dialogueTextEl.textContent = state.fullText;
  state.waitingForClick = true;
  clickHintEl.classList.remove("hidden");
}

/* ══════════════════════════════════════════════
   CLICK HANDLING (STORY MODE)
   ══════════════════════════════════════════════ */
storyEl.addEventListener("click", (e) => {
  if (e.target.closest("button")) return;
  handleStoryClick();
});

function handleStoryClick() {
  if (state.mode !== "story") return;

  if (state.typing) {
    // Complete typing immediately
    completeTyping();
    return;
  }

  if (state.waitingForClick) {
    state.waitingForClick = false;
    clickHintEl.classList.add("hidden");
    state.scene++;
    showScene();
  }
}

// Keyboard support
document.addEventListener("keydown", e => {
  if (state.mode !== "story") return;

  if (e.key === " " || e.key === "Enter") {
    e.preventDefault();
    handleStoryClick();
  }
  if (e.key === "Escape") {
    toggleMenu();
  }
  // Number keys for choices
  if (e.key >= "1" && e.key <= "9") {
    const idx = parseInt(e.key) - 1;
    const btns = choiceAreaEl.querySelectorAll(".choice-btn");
    if (btns[idx]) btns[idx].click();
  }
});

/* ══════════════════════════════════════════════
   STORY CHARACTER RENDERING
   ══════════════════════════════════════════════ */
function renderStoryCharacter(c, mood) {
  // Brief entering animation
  storyCharEl.classList.add("entering");

  setTimeout(() => {
    if (c.image) {
      storyCharEl.innerHTML = `
        <figure style="--img-pos:${c.imagePosition || 'center'}">
          <img src="${assetUrl(c.image)}" alt="${c.name}" onerror="this.parentElement.outerHTML=avatarSVGMarkup('${c.id}','${mood || "neutral"}')">
        </figure>
      `;
    } else {
      storyCharEl.innerHTML = avatarSVGMarkup(c.id, mood || "neutral");
    }
    storyCharEl.classList.remove("entering");
  }, 100);
}

   MENU SYSTEM

function toggleMenu() {
  menuOverlayEl.classList.toggle("hidden");
  const c = getCharacter();

$("storyMenuBtn").addEventListener("click", toggleMenu);
$("menuCloseBtn").addEventListener("click", () => menuOverlayEl.classList.add("hidden"));
$("menuSaveBtn").addEventListener("click", () => { menuOverlayEl.classList.add("hidden"); openSaveLoad("save"); });
$("menuLoadBtn").addEventListener("click", () => { menuOverlayEl.classList.add("hidden"); openSaveLoad("load"); });
$("menuLobbyBtn").addEventListener("click", () => {

$("lobbyStartBtn").addEventListener("click", () => {

/* ══════════════════════════════════════════════
   SAVE / LOAD SYSTEM
   ══════════════════════════════════════════════ */
const SAVE_KEY = "biovibe_saves";
const AUTO_SAVE_KEY = "biovibe_auto";

function getSaveData() {
  return {
    version: 2,
    timestamp: Date.now(),
    charId: state.charId,
    chapter: state.chapter,
    scene: state.scene,
    affection: { ...state.affection },
    flags: { ...state.flags },
    completed: JSON.parse(JSON.stringify(state.completed))
  };
}

function loadSaveData(data) {
  if (!data || data.version !== 2) return false;
  state.charId = data.charId;
  state.chapter = data.chapter;
  state.scene = data.scene;
  state.affection = data.affection || {};
  state.flags = data.flags || {};
  state.completed = data.completed || {};

  // Ensure all characters have state
  characters.forEach(c => {
    if (state.affection[c.id] === undefined) state.affection[c.id] = 0;
    if (!state.completed[c.id]) state.completed[c.id] = [];
  });
  return true;
}

function autoSave() {
  try {
    localStorage.setItem(AUTO_SAVE_KEY, JSON.stringify(getSaveData()));
  } catch (e) { /* ignore */ }
}

function autoLoad() {
  try {
    const data = JSON.parse(localStorage.getItem(AUTO_SAVE_KEY));
    if (data) {
      loadSaveData(data);
      return true;
    }
  } catch (e) { /* ignore */ }
  return false;
}

function openSaveLoad(mode) {
  $("saveLoadTitle").textContent = mode === "save" ? "저장하기" : "불러오기";
  $("saveLoadSubtitle").textContent = mode === "save" ? "슬롯을 선택하면 현재 진행 상황이 저장됩니다." : "저장된 슬롯을 선택하세요.";

  const slotsEl = $("saveSlots");
  slotsEl.innerHTML = "";

  let saves;
  try { saves = JSON.parse(localStorage.getItem(SAVE_KEY)) || {}; } catch(e) { saves = {}; }

  for (let i = 1; i <= 3; i++) {
    const save = saves[`slot${i}`];
    const btn = document.createElement("button");
    btn.className = "save-slot";

    if (save) {
      const c = characters.find(ch => ch.id === save.charId);
      const date = new Date(save.timestamp);
      const dateStr = `${date.getMonth() + 1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2, "0")}`;
      btn.innerHTML = `
        <div class="slot-info">
          <strong>슬롯 ${i} · ${c ? c.name : "?"} 제${(save.chapter || 0) + 1}장</strong>
          <span>${dateStr} · 호감도 ${(save.affection && save.affection[save.charId]) || 0}</span>
        </div>
        <div class="slot-badge">${mode === "save" ? "덮어쓰기" : "불러오기"}</div>
      `;
    } else {
      btn.innerHTML = `
        <div class="slot-info">
          <strong>슬롯 ${i}</strong>
          <span>${mode === "save" ? "빈 슬롯 — 클릭하여 저장" : "빈 슬롯"}</span>
        </div>
        <div class="slot-badge">${mode === "save" ? "저장" : "—"}</div>
      `;
      if (mode === "load") btn.disabled = true;
    }

    btn.addEventListener("click", () => {
      if (mode === "save") {
        saves[`slot${i}`] = getSaveData();
        try { localStorage.setItem(SAVE_KEY, JSON.stringify(saves)); } catch (e) { /* ignore */ }
        showToast(`슬롯 ${i}에 저장되었습니다.`);
        saveLoadOverlayEl.classList.add("hidden");
      } else {
        const data = saves[`slot${i}`];
        if (data && loadSaveData(data)) {
          showToast(`슬롯 ${i} 불러오기 완료.`);
          saveLoadOverlayEl.classList.add("hidden");

          if (state.charId && stories[state.charId] && stories[state.charId][state.chapter]) {
            startChapter(state.charId, state.chapter);
            // Jump to saved scene
            state.scene = data.scene;
            showScene();
          } else {
            renderLobby();
          }
        }
      }
    });

    slotsEl.appendChild(btn);
  }

  saveLoadOverlayEl.classList.remove("hidden");
}

$("saveLoadCloseBtn").addEventListener("click", () => saveLoadOverlayEl.classList.add("hidden"));

/* ══════════════════════════════════════════════
   SVG AVATAR SYSTEM
   ══════════════════════════════════════════════ */
function miniAvatarMarkup(character) {
  if (character.thumb || character.image) {
    const source = character.thumb || character.image;
    const position = character.thumbPosition || character.imagePosition || "center";
    return `<img src="${assetUrl(source)}" alt="" loading="lazy" style="--thumb-pos:${position}" onerror="this.outerHTML=miniIcon('${character.id}')">`;
  }
  return miniIcon(character.id);
}

function miniIcon(idOrChar) {
  const character = typeof idOrChar === "string" ? characters.find(c => c.id === idOrChar) : idOrChar;
  if (!character) return "";
  const stroke = "#30273a";

  if (character.shape === "phage") {
    return `<svg viewBox="0 0 64 64"><polygon points="32 5 51 17 49 39 32 50 15 39 13 17" fill="${character.second}" stroke="${stroke}" stroke-width="3"/><path d="M32 50v9M21 57l-9 5M43 57l9 5M26 58l-4-11M38 58l4-11" stroke="${stroke}" stroke-width="3" stroke-linecap="round"/><path d="M25 24c4-5 10-5 14 0M24 34h16" stroke="#fff" stroke-width="3" stroke-linecap="round"/></svg>`;
  }
  if (character.shape === "worm") {
    return `<svg viewBox="0 0 64 64"><path d="M10 39c7-18 18 11 28-7 7-13 18-6 16 6-2 12-16 17-28 10-8-5-14-1-16-9z" fill="${character.second}" stroke="${stroke}" stroke-width="3"/><circle cx="44" cy="31" r="2.4" fill="${stroke}"/></svg>`;
  }
  if (character.shape === "ecoli" || character.shape === "rod") {
    return `<svg viewBox="0 0 64 64"><path d="M18 42c-8-8-4-20 5-26s22-4 26 4-1 20-11 25-15 2-20-3z" fill="${character.second}" stroke="${stroke}" stroke-width="3"/><path d="M13 22C6 18 5 12 9 8M50 42c7 4 8 10 4 15M20 51c-3 7-9 8-14 5" stroke="${stroke}" stroke-width="3" stroke-linecap="round"/><circle cx="31" cy="29" r="2.2" fill="${stroke}"/></svg>`;
  }
  if (character.shape === "cyano") {
    return `<svg viewBox="0 0 64 64">${[8,18,28,38,48].map((x, i) => `<circle cx="${x + i}" cy="${34 + Math.sin(i) * 6}" r="9" fill="${i % 2 ? character.color : character.second}" stroke="${stroke}" stroke-width="2"/>`).join("")}</svg>`;
  }
  if (character.shape === "algae") {
    return `<svg viewBox="0 0 64 64"><circle cx="32" cy="28" r="18" fill="${character.second}" stroke="${stroke}" stroke-width="3"/>${[0,1,2,3,4].map(i => `<ellipse cx="${32 + Math.cos(i*1.26)*22}" cy="${28 + Math.sin(i*1.26)*22}" rx="8" ry="13" transform="rotate(${i*72} 32 28)" fill="${i%2?character.color:character.second}" stroke="${stroke}" stroke-width="2"/>`).join("")}<circle cx="28" cy="26" r="2.5" fill="${stroke}"/><circle cx="36" cy="26" r="2.5" fill="${stroke}"/></svg>`;
  }
  if (character.shape === "purple") {
    return `<svg viewBox="0 0 64 64"><ellipse cx="32" cy="32" rx="22" ry="18" fill="${character.color}" stroke="${stroke}" stroke-width="3"/>${[0,1,2].map(i => `<circle cx="${22+i*10}" cy="${28+i*4}" r="4" fill="${character.second}" stroke="${stroke}" stroke-width="2"/>`).join("")}<circle cx="28" cy="29" r="2" fill="#fff"/><circle cx="36" cy="29" r="2" fill="#fff"/></svg>`;
  }
  // default yeast
  return `<svg viewBox="0 0 64 64"><circle cx="32" cy="33" r="22" fill="${character.second}" stroke="${stroke}" stroke-width="3"/><circle cx="24" cy="29" r="2.5" fill="${stroke}"/><circle cx="40" cy="29" r="2.5" fill="${stroke}"/><path d="M25 40c5 4 10 4 15 0" stroke="${stroke}" stroke-width="3" stroke-linecap="round" fill="none"/></svg>`;
}

function avatarSVGMarkup(charId, mood) {
  const character = characters.find(c => c.id === charId);
  if (!character) return "";

  const face = mood === "sad"
    ? `<path d="M172 170c14-10 30-10 44 0" stroke="#34303a" stroke-width="5" stroke-linecap="round" fill="none"/>`
    : mood === "happy"
      ? `<path d="M171 162c12 17 34 17 47 0" stroke="#34303a" stroke-width="5" stroke-linecap="round" fill="none"/>`
      : mood === "shy"
        ? `<path d="M178 163c8 10 22 10 30 0" stroke="#34303a" stroke-width="4" stroke-linecap="round" fill="none"/>`
        : `<path d="M174 165c11 8 27 8 38 0" stroke="#34303a" stroke-width="5" stroke-linecap="round" fill="none"/>`;

  const eyes = mood === "sad"
    ? `<ellipse cx="181" cy="147" rx="7" ry="8" fill="#34303a"/><ellipse cx="239" cy="147" rx="7" ry="8" fill="#34303a"/><circle cx="183" cy="144" r="3" fill="#fff"/><circle cx="241" cy="144" r="3" fill="#fff"/>`
    : mood === "happy"
      ? `<path d="M174 145c4-8 12-8 16 0" stroke="#34303a" stroke-width="5" stroke-linecap="round" fill="none"/><path d="M232 145c4-8 12-8 16 0" stroke="#34303a" stroke-width="5" stroke-linecap="round" fill="none"/>`
      : `<circle cx="181" cy="145" r="8" fill="#34303a"/><circle cx="239" cy="145" r="8" fill="#34303a"/><circle cx="184" cy="142" r="3" fill="#fff"/><circle cx="242" cy="142" r="3" fill="#fff"/>`;

  const motif = motifMarkup(character);

  return `
    <svg class="avatar-svg" viewBox="0 0 420 420" role="img" aria-label="${character.name}">
      <defs>
        <radialGradient id="sk-${character.id}" cx="35%" cy="24%" r="70%">

        <linearGradient id="hr-${character.id}" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0%" stop-color="${character.second}"/>
          <stop offset="100%" stop-color="${character.color}"/>
        </linearGradient>
      </defs>
      <g opacity="0.35">
        <circle cx="76" cy="86" r="16" fill="${character.second}"/>
        <circle cx="350" cy="124" r="11" fill="${character.color}"/>
        <circle cx="330" cy="310" r="18" fill="${character.second}"/>
      </g>
      ${motif.back}
      <g>
        <path d="M123 284c10-58 41-89 86-89s77 31 87 89l16 86H107l16-86z" fill="#fffaf2" stroke="#34303a" stroke-width="5"/>
        <path d="M151 244c28 24 86 24 116 0l14 126H137l14-126z" fill="${character.second}" opacity="0.72"/>
        <path d="M183 206h54v45c0 16-12 28-27 28s-27-12-27-28v-45z" fill="url(#sk-${character.id})" stroke="#34303a" stroke-width="5"/>
        <circle cx="210" cy="142" r="78" fill="url(#sk-${character.id})" stroke="#34303a" stroke-width="5"/>
        <path d="M133 131c8-60 46-96 88-91 47 6 72 42 72 94-25-34-71-40-124-29-6 10-18 20-36 26z" fill="url(#hr-${character.id})" stroke="#34303a" stroke-width="5"/>
        <path d="M151 106c31-27 83-32 120-7" fill="none" stroke="rgba(255,255,255,0.72)" stroke-width="8" stroke-linecap="round"/>
        ${eyes}
        ${face}
        ${blush}
        <path d="M124 300c-31 10-49 30-56 61M296 300c31 10 49 30 56 61" stroke="#34303a" stroke-width="12" stroke-linecap="round" fill="none"/>
        <path d="M125 300c-31 10-49 30-56 61M295 300c31 10 49 30 56 61" stroke="#fffaf2" stroke-width="7" stroke-linecap="round" fill="none"/>
        <path d="M172 285l38 34 38-34" fill="none" stroke="#34303a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      ${motif.front}

  `;
}

      front: `<g>${[0,1,2,3].map(i => `<circle cx="${274 + i * 24}" cy="${292 + (i % 2) * 18}" r="10" fill="${s}" stroke="${dark}" stroke-width="4"/>`).join("")}<path d="M287 251h54" stroke="${c}" stroke-width="8" stroke-linecap="round"/></g>`

    };
  }
  if (character.shape === "cyano") {
